general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock
}

listener {
    timeout = 60
    on-timeout = brightnessctl -s set 10%
    on-resume = brightnessctl -r
}

listener {
    timeout = 180
    on-timeout = pidof hyprlock || hyprlock
}

listener {
    timeout = 600
    on-timeout = systemctl suspend
}
